<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop UI Clone</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icon оруулахын тулд FontAwesome ашиглав -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="ps-app">
        <!-- Дээд цэс (Menu Bar) -->
        <header class="ps-top-bar">
            <div class="ps-logo"><i class="fab fa-adobe"></i></div>
            <nav class="ps-menu">
                <span>File</span><span>Edit</span><span>Image</span><span>Layer</span>
                <span>Type</span><span>Select</span><span>Filter</span><span>View</span>
                <span>Window</span><span>Help</span>
            </nav>
        </header>

        <!-- Тохиргооны мөр (Options Bar) -->
        <div class="ps-options-bar">
            <i class="fas fa-home"></i>
            <span class="divider"></span>
            <span>Feather: 0 px</span>
            <span>Anti-alias</span>
            <span>Style: Normal</span>
        </div>

        <div class="ps-workspace">
            <!-- Зүүн талын багажны мөр (Toolbar) -->
            <aside class="ps-toolbar">
                <div class="tool active"><i class="fas fa-arrows-alt"></i></div>
                <div class="tool"><i class="fas fa-border-all"></i></div>
                <div class="tool"><i class="fas fa-magic"></i></div>
                <div class="tool"><i class="fas fa-crop-alt"></i></div>
                <div class="tool"><i class="fas fa-eye-dropper"></i></div>
                <div class="tool"><i class="fas fa-band-aid"></i></div>
                <div class="tool"><i class="fas fa-paint-brush"></i></div>
                <div class="tool"><i class="fas fa-eraser"></i></div>
                <div class="tool"><i class="fas fa-font"></i></div>
                <div class="tool"><i class="fas fa-search"></i></div>
                
                <div class="colors">
                    <div class="color-box fg-color"></div>
                    <div class="color-box bg-color"></div>
                </div>
            </aside>

            <!-- Гол зургийн талбар (Canvas) -->
            <main class="ps-canvas-area">
                <div class="canvas-tab">Dog detective.png @ 66.7% (Background, RGB/8#) *</div>
                <div class="canvas-wrapper">
                    <!-- Зураг байрлах хэсэг -->
                    <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Dog" class="main-image">
                    
                    <!-- Доод талын хөвдөг цэс (Contextual Task Bar) -->
                    <div class="context-bar">
                        <button><i class="fas fa-magic"></i> Select subject</button>
                        <button><i class="fas fa-user-slash"></i> Remove background</button>
                        <button><i class="fas fa-sliders-h"></i> Adjust colors</button>
                    </div>
                </div>
            </main>

            <!-- Баруун талын самбар (Right Panels) -->
            <aside class="ps-right-panel">
                <!-- Properties Panel -->
                <div class="panel">
                    <div class="panel-tabs">
                        <span class="active">Properties</span><span>Adjustments</span>
                    </div>
                    <div class="panel-content">
                        <div class="prop-section"><i class="fas fa-image"></i> Pixel Layer</div>
                        <div class="prop-section">
                            <h4>Quick Actions</h4>
                            <button class="action-btn">Remove Background</button>
                            <button class="action-btn">Select Subject</button>
                        </div>
                    </div>
                </div>

                <!-- Layers Panel -->
                <div class="panel layers-panel">
                    <div class="panel-tabs">
                        <span class="active">Layers</span><span>Channels</span><span>Paths</span>
                    </div>
                    <div class="panel-content layers-content">
                        <div class="layer-item">
                            <i class="fas fa-eye"></i> <i class="fas fa-circle-half-stroke"></i> Color and vibrance 1
                        </div>
                        <div class="layer-item">
                            <i class="fas fa-eye"></i> <i class="fas fa-chart-line"></i> Curves 1
                        </div>
                        <div class="layer-item active-layer">
                            <i class="fas fa-eye"></i> <i class="fas fa-image"></i> <i>Background</i>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
